<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Login ── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #141822;
      border: 1px solid #1e2235;
      border-radius: 12px;
      padding: 36px;
      width: 360px;
    }

    .login-card h2 { font-size: 20px; margin-bottom: 6px; }
    .login-card p  { font-size: 13px; color: #64748b; margin-bottom: 24px; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid #1e2235;
      background: #141822;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    header h1 { font-size: 17px; font-weight: 600; color: #f1f5f9; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    #status { font-size: 12px; color: #475569; }

    /* ── Buttons ── */
    button {
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .btn-ghost { background: #1e2235; color: #94a3b8; }
    .btn-ghost:hover { background: #263048; }

    .btn-danger { background: transparent; color: #f87171; border: 1px solid #7f1d1d; }
    .btn-danger:hover { background: #1e0a0a; }

    /* ── Inputs ── */
    label { display: block; font-size: 12px; color: #64748b; margin-bottom: 5px; }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"],
    select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #1e2235;
      border-radius: 6px;
      padding: 9px 11px;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #2563eb; }
    select option { background: #141822; }

    /* ── Main ── */
    .main { max-width: 860px; margin: 0 auto; padding: 24px; }

    /* ── Add Task Bar ── */
    .add-bar {
      display: grid;
      grid-template-columns: 1fr 140px 120px auto;
      gap: 8px;
      align-items: end;
      margin-bottom: 28px;
      background: #141822;
      border: 1px solid #1e2235;
      border-radius: 10px;
      padding: 14px;
    }

    .add-bar input, .add-bar select { margin-bottom: 0; }
    .add-bar label { margin-bottom: 4px; font-size: 11px; }

    /* ── Sections ── */
    .section { margin-bottom: 26px; }

    .section-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header.overdue { color: #f87171; }
    .section-header.today   { color: #34d399; }

    .badge-count {
      background: #1e2235;
      color: #64748b;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
    }

    /* ── Task Row ── */
    .task-list { display: flex; flex-direction: column; gap: 2px; }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 6px;
      transition: background 0.1s;
      text-decoration: none;
      color: inherit;
    }
    .task:hover { background: #141822; }

    .priority-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .p-urgent { background: #f87171; }
    .p-high   { background: #fb923c; }
    .p-normal { background: #60a5fa; }
    .p-low    { background: #4b5563; }

    .task-name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .source-manual  { background: #1e2235; color: #475569; }
    .source-clickup { background: #1a2744; color: #60a5fa; }

    .doc-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 2px 8px 2px 6px;
      border-radius: 12px;
      background: #1a2030; border: 1px solid #2a3248;
      color: #94a3b8; text-decoration: none; flex-shrink: 0;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .doc-chip:hover { background: #1e2a45; border-color: #3b4f7a; color: #e2e8f0; }
    .doc-chip svg { flex-shrink: 0; }

    .due-label { font-size: 11px; color: #475569; flex-shrink: 0; }
    .due-label.overdue { color: #f87171; }
    .due-label.today   { color: #34d399; }

    .task-del {
      background: none; border: none;
      color: #334155; font-size: 15px;
      padding: 0 2px; cursor: pointer;
      line-height: 1; flex-shrink: 0;
      transition: color 0.1s;
    }
    .task-del:hover { color: #f87171; background: none; }

    /* ── States ── */
    .loader { text-align: center; padding: 60px; color: #475569; font-size: 13px; }

    .error-box {
      background: #1e0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 13px 16px;
      color: #f87171;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .empty { color: #334155; font-size: 13px; padding: 10px 12px; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 20;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: #141822;
      border: 1px solid #1e2235;
      border-radius: 12px;
      padding: 24px;
      width: 380px;
      max-width: 92vw;
    }
    .modal h3 { font-size: 15px; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

    hr { border: none; border-top: 1px solid #1e2235; margin: 16px 0; }
    .hint { font-size: 11px; color: #475569; margin-top: -10px; margin-bottom: 14px; }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #1e0a0a; border: 1px solid #7f1d1d; border-radius: 8px;
      padding: 12px 18px; color: #f87171; font-size: 13px;
      display: flex; align-items: center; gap: 12px;
      z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; pointer-events: auto; }
    .toast-btn {
      background: #7f1d1d; color: #fca5a5; border: none;
      border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer;
      white-space: nowrap;
    }
    .toast-btn:hover { background: #991b1b; }

    /* ── AI Bar ── */
    .ai-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0d14;
      border-top: 1px solid #1e2235;
      padding: 12px 24px;
      z-index: 100;
    }
    .ai-bar {
      display: flex; align-items: stretch; gap: 8px; max-width: 780px; margin: 0 auto; height: 40px;
    }
    .mode-panel { display: flex; align-items: stretch; gap: 8px; flex: 1; }
    .menu-toggle {
      background: none; border: 1px solid #1e2235; border-radius: 6px;
      color: #94a3b8; font-size: 15px; padding: 0 12px;
      cursor: pointer; flex-shrink: 0;
    }
    .menu-toggle:hover { border-color: #2563eb; color: #e2e8f0; }
    .ai-input {
      flex: 1; background: #0f1117; border: 1px solid #2563eb33;
      border-radius: 6px; padding: 0 12px; color: #e2e8f0;
      font-size: 13px; outline: none; font-family: inherit;
      height: 100%; box-sizing: border-box;
    }
    .ai-input:focus { border-color: #2563eb; }
    .ai-btn {
      background: #2563eb; color: #fff; border: none;
      border-radius: 6px; padding: 0 16px; font-size: 13px;
      cursor: pointer; white-space: nowrap; font-family: inherit;
      flex-shrink: 0;
    }
    .ai-btn:hover { background: #1d4ed8; }
    .ai-btn:disabled { background: #1e2235; color: #475569; cursor: default; }
    .ai-error { font-size: 12px; color: #f87171; margin-bottom: 8px; }

    /* ── Subtasks ── */
    .task-wrapper { display: flex; flex-direction: column; }

    .sub-toggle {
      background: none; border: none; color: #334155; font-size: 11px;
      padding: 0 4px; cursor: pointer; line-height: 1; flex-shrink: 0;
      margin-left: auto; transition: color 0.15s;
    }
    .sub-toggle:hover { color: #94a3b8; background: none; }

    .subtask-drawer {
      display: none; flex-direction: column; gap: 4px;
      padding: 4px 12px 6px 28px;
      margin: 0 12px 4px 12px;
      border-left: 2px solid #1e2235;
    }
    .subtask-drawer.open { display: flex; }

    .subtask-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #94a3b8;
    }
    .sub-check {
      appearance: none; -webkit-appearance: none;
      width: 14px; height: 14px; flex-shrink: 0;
      border: 1.5px solid #334155; border-radius: 3px;
      background: transparent; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background-repeat: no-repeat; background-position: center; background-size: 10px 8px;
    }
    .sub-check:hover:not(:disabled) { border-color: #2563eb; }
    .sub-check:checked {
      background-color: #2563eb; border-color: #2563eb;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    }
    .sub-check:disabled { opacity: 0.35; cursor: not-allowed; }
    .sub-name  { flex: 1; }
    .sub-done  { text-decoration: line-through; color: #475569; }

    .sub-del {
      background: none; border: none; color: #334155; font-size: 13px;
      padding: 0 2px; cursor: pointer; flex-shrink: 0; transition: color 0.15s;
    }
    .sub-del:hover { color: #f87171; background: none; }

    .sub-add-form { display: flex; gap: 5px; margin-top: 6px; align-items: center; }
    .sub-input {
      flex: 2; background: #0f1117; border: 1px solid #1e2235;
      border-radius: 4px; padding: 0 8px; color: #e2e8f0;
      font-size: 12px; outline: none; margin: 0 !important;
      height: 28px; box-sizing: border-box; min-width: 0;
      align-self: center;
    }
    .sub-input:focus { border-color: #2563eb; }
    .sub-date, .sub-priority, .sub-doc-input {
      background: #0f1117; border: 1px solid #1e2235;
      border-radius: 4px; padding: 0 6px; color: #e2e8f0;
      font-size: 11px; outline: none; margin-bottom: 0;
      height: 28px; box-sizing: border-box; font-family: inherit;
      flex: none;
    }
    .sub-date-wrap {
      width: 120px; flex: none; overflow: hidden;
      border: 1px solid #1e2235; border-radius: 4px; height: 28px;
      box-sizing: border-box; display: flex; align-items: center;
    }
    .sub-date-wrap:focus-within { border-color: #2563eb; }
    .sub-date { width: 160px; flex: none; border: none !important; outline: none; height: 26px; }
    .sub-priority { width: 82px; cursor: pointer; }
    .sub-doc-input { width: 90px; }
    .sub-date:focus, .sub-priority:focus, .sub-doc-input:focus { border-color: #2563eb; }
    .sub-priority option { background: #141822; }
    .sub-add-btn {
      background: #2563eb; color: #fff; border: none;
      border-radius: 4px; padding: 0 12px; font-size: 13px; cursor: pointer;
      height: 28px; flex-shrink: 0;
    }
    .sub-add-btn:hover { background: #1d4ed8; }
    .sub-loading, .sub-error { font-size: 11px; color: #475569; padding: 2px 0; }
    .sub-error { color: #f87171; }
    .sub-due { font-size: 10px; color: #475569; flex-shrink: 0; }
    .sub-due.overdue { color: #f87171; }
    .sub-priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .task.has-subs { cursor: pointer; }
    .task-list-link { text-decoration: none; }
    .task-list-link:hover { text-decoration: underline; }
    .sub-chevron {
      font-size: 11px; color: #60a5fa; flex-shrink: 0; font-weight: 600;
    }

    .task-action-btn {
      background: none; border: none; color: #334155; font-size: 13px;
      padding: 0 3px; cursor: pointer; line-height: 1; flex-shrink: 0;
      transition: color 0.15s; font-family: inherit;
    }
    .task-action-btn:hover { color: #94a3b8; background: none; }

    .doc-edit-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px 6px 30px;
      margin: 0 12px 4px 12px;
      border-left: 2px solid #2563eb33;
    }
    .doc-edit-input {
      flex: 1; background: #0f1117; border: 1px solid #2563eb;
      border-radius: 4px; padding: 4px 8px; color: #e2e8f0;
      font-size: 12px; outline: none; margin-bottom: 0; width: auto;
    }
    .doc-edit-save {
      background: #2563eb; color: #fff; border: none;
      border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer;
    }
    .doc-edit-save:hover { background: #1d4ed8; }
    .doc-edit-cancel {
      background: #1e2235; color: #94a3b8; border: none;
      border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer;
    }
    .doc-edit-cancel:hover { background: #263048; }

    /* ── Status ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      border: 1px solid transparent; cursor: pointer;
      flex-shrink: 0; font-family: inherit; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .status-badge:hover { opacity: 0.8; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .s-not-started { background: #1e2235; border-color: #2a3248; color: #64748b; }
    .s-not-started .status-dot { background: #475569; }
    .s-in-progress { background: #1a2744; border-color: #2563eb55; color: #60a5fa; }
    .s-in-progress .status-dot { background: #60a5fa; }
    .s-blocked     { background: #1e0a0a; border-color: #7f1d1d55; color: #f87171; }
    .s-blocked     .status-dot { background: #f87171; }
    .s-finished    { background: #052e16; border-color: #16532455; color: #34d399; }
    .s-finished    .status-dot { background: #34d399; }

    .status-menu {
      background: #141822; border: 1px solid #1e2235;
      border-radius: 8px; padding: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 140px;
    }
    .status-option {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 5px;
      font-size: 12px; color: #94a3b8; cursor: pointer;
    }
    .status-option:hover { background: #1e2235; color: #e2e8f0; }
    .status-option.active { color: #e2e8f0; }

    /* ── Inline editing ── */
    .inline-edit-input {
      background: #0f1117; border: 1px solid #2563eb;
      border-radius: 4px; padding: 0 6px !important; color: #e2e8f0;
      font-size: 13px; outline: none; font-family: inherit;
      height: 22px !important; box-sizing: border-box; flex: 1; min-width: 0;
      width: auto !important; margin: 0 !important;
    }
    .inline-date-input {
      background: #0f1117; border: 1px solid #2563eb;
      border-radius: 4px; padding: 0 4px !important; color: #e2e8f0;
      font-size: 11px; outline: none; font-family: inherit;
      height: 20px !important; width: 120px !important; box-sizing: border-box; flex: none;
      margin: 0 !important;
    }
    .priority-dot { cursor: pointer; transition: transform 0.15s; }
    .priority-dot:hover { transform: scale(1.4); }
    .sub-priority-dot { cursor: pointer; transition: transform 0.15s; }
    .sub-priority-dot:hover { transform: scale(1.4); }
    .due-label { cursor: pointer; }
    .due-label:hover { color: #94a3b8; }
    .task-name[data-editable] { cursor: text; }
    .add-due {
      font-size: 10px; color: #1e2235; cursor: pointer;
      flex-shrink: 0; transition: color 0.15s;
    }
    .task:hover .add-due { color: #475569; }
    .add-due:hover { color: #94a3b8 !important; }
    .sub-due { cursor: pointer; }
    .sub-due:hover { opacity: 0.7; }

    /* ── Sidebar ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 40;
    }
    .sidebar-overlay.open { display: block; }

    .sidebar {
      position: fixed; top: 0; right: -360px; width: 340px; height: 100vh;
      background: #141822; border-left: 1px solid #1e2235;
      z-index: 50; display: flex; flex-direction: column;
      transition: right 0.22s ease; overflow: hidden;
    }
    .sidebar.open { right: 0; }

    .sidebar-header {
      display: flex; align-items: center; gap: 10px;
      padding: 15px 16px 12px; border-bottom: 1px solid #1e2235; flex-shrink: 0;
    }
    .sidebar-title {
      flex: 1; font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-close {
      background: none; border: none; color: #64748b; font-size: 20px;
      cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0;
    }
    .sidebar-close:hover { color: #e2e8f0; }

    .sidebar-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    .sidebar-section { padding: 12px 16px; border-bottom: 1px solid #1e2235; }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #475569; margin-bottom: 8px;
    }
    .sidebar-doc-item { display: flex; align-items: center; gap: 6px; padding: 5px 0; }
    .sidebar-doc-link {
      flex: 1; font-size: 12px; color: #94a3b8; text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 5px;
    }
    .sidebar-doc-link:hover { color: #e2e8f0; }
    .sidebar-doc-primary { font-size: 10px; color: #334155; flex-shrink: 0; }
    .sidebar-doc-del {
      background: none; border: none; color: #334155; font-size: 15px;
      cursor: pointer; padding: 0 2px; flex-shrink: 0; transition: color 0.1s;
    }
    .sidebar-doc-del:hover { color: #f87171; background: none; }
    .sidebar-doc-add { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
    .sidebar-doc-input {
      flex: 1; background: #0f1117; border: 1px solid #1e2235;
      border-radius: 4px; padding: 0 8px; color: #e2e8f0;
      font-size: 12px; outline: none; margin: 0; height: 28px; box-sizing: border-box;
    }
    .sidebar-doc-input:focus { border-color: #2563eb; }
    .sidebar-add-btn {
      background: #2563eb; color: #fff; border: none;
      border-radius: 4px; padding: 0 12px; font-size: 12px;
      cursor: pointer; height: 28px; flex-shrink: 0;
    }
    .sidebar-add-btn:hover { background: #1d4ed8; }

    .sidebar-notes { padding: 12px 16px 16px; }
    .sidebar-notes-header {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #475569; margin-bottom: 10px;
    }
    .notes-feed {
      display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px;
    }
    .note-item { display: flex; flex-direction: column; gap: 3px; }
    .note-meta { font-size: 10px; color: #475569; }
    .note-content { font-size: 13px; color: #cbd5e1; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .notes-empty { font-size: 12px; color: #334155; margin-bottom: 12px; display: block; }
    .note-add-row {
      display: flex; gap: 6px; align-items: flex-end;
    }
    .note-textarea {
      flex: 1; background: #0f1117; border: 1px solid #1e2235;
      border-radius: 4px; padding: 6px 8px; color: #e2e8f0;
      font-size: 12px; outline: none; margin: 0; font-family: inherit;
      resize: none; min-height: 32px; max-height: 100px;
      overflow-y: auto; box-sizing: border-box;
    }
    .note-textarea:focus { border-color: #2563eb; }
    .note-post-btn {
      background: #2563eb; color: #fff; border: none;
      border-radius: 4px; padding: 0 14px; font-size: 12px;
      cursor: pointer; flex-shrink: 0; height: 32px;
    }

<body>

<!-- ── Login ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h2>Dashboard</h2>
    <p>Sign in to access your tasks.</p>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') login()">
    <div id="loginError" class="error-box" style="display:none;margin-bottom:14px"></div>
    <button class="btn-primary" onclick="login()" id="loginBtn" style="width:100%">Sign in</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app" style="display:none; padding-bottom: 80px">
  <header>
    <h1>Dashboard</h1>
    <div class="header-right">
      <span id="status"></span>
      <button class="btn-ghost" onclick="loadAll()">Refresh</button>
      <button class="btn-ghost" onclick="openSettings()">Settings</button>
      <button class="btn-danger" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="main">
    <div id="errorBox" class="error-box" style="display:none"></div>



    <div id="loader" class="loader">Loading tasks…</div>
    <div id="dashboard" style="display:none"></div>
  </div>
</div>

<!-- ── Settings Modal ── -->
<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <h3>Settings</h3>
    <label>ClickUp API token</label>
    <input type="password" id="cuToken" placeholder="pk_xxxxxxxxxxxx">
    <p class="hint">ClickUp → Settings → Apps → API Token. Stored in this browser only.</p>
    <label>ClickUp List ID <span style="color:#334155">(optional — faster loads)</span></label>
    <input type="text" id="cuListId" placeholder="901xxxxxxxx">
    <p class="hint">From your ClickUp list URL: app.clickup.com/.../v/li/{list_id}</p>
    <hr>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  const SB_URL  = 'https://eiwwdssiiiafucrlopuj.supabase.co';
  const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpd3dkc3NpaWlhZnVjcmxvcHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDgyMzQsImV4cCI6MjA5MzY4NDIzNH0.HJAVJV9yD2VhN_bGIjyxXTKhQ5yVr2cy8TdKnZV1GHM';
  const CU_BASE = 'https://api.clickup.com/api/v2';

  // ── Supabase REST helpers ─────────────────────────────

  function getSession() {
    try { return JSON.parse(localStorage.getItem('sb_session') || 'null'); } catch { return null; }
  }

  function saveSession(s) { localStorage.setItem('sb_session', JSON.stringify(s)); }
  function clearSession()  { localStorage.removeItem('sb_session'); }

  function authHeaders(token) {
    return {
      'apikey':        SB_KEY,
      'Authorization': 'Bearer ' + token,
      'Content-Type':  'application/json'
    };
  }

  async function sbAuth(email, password) {
    const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method:  'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error_description || data.msg || 'Login failed');
    return data;
  }

  async function sbSelect(table, query = '') {
    const session = getSession();
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {
      headers: authHeaders(session.access_token)
    });
    if (r.status === 401) { showSessionExpired(); throw new Error('Session expired'); }
    const data = await r.json();
    if (!r.ok) throw new Error(data.message || 'Database error');
    return data;
  }

  async function sbInsert(table, row) {
    const session = getSession();
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method:  'POST',
      headers: { ...authHeaders(session.access_token), 'Prefer': 'return=representation' },
      body:    JSON.stringify(row)
    });
    if (r.status === 401) { showSessionExpired(); throw new Error('Session expired'); }
    const data = await r.json();
    if (!r.ok) throw new Error(data.message || 'Insert failed');
    return data;
  }

  async function sbDelete(table, id) {
    const session = getSession();
    const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:  'DELETE',
      headers: authHeaders(session.access_token)
    });
    if (r.status === 401) { showSessionExpired(); throw new Error('Session expired'); }
    if (!r.ok) throw new Error('Delete failed');
  }

  async function sbUpsert(table, row) {
    const session = getSession();
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method:  'POST',
      headers: { ...authHeaders(session.access_token), 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body:    JSON.stringify(row)
    });
    if (r.status === 401) { showSessionExpired(); throw new Error('Session expired'); }
    if (!r.ok) throw new Error('Upsert failed');
  }

  async function sbPatch(table, query, body) {
    const session = getSession();
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {
      method:  'PATCH',
      headers: { ...authHeaders(session.access_token), 'Prefer': 'return=minimal' },
      body:    JSON.stringify(body)
    });
    if (r.status === 401) { showSessionExpired(); throw new Error('Session expired'); }
    if (!r.ok) throw new Error('Update failed');
  }

  // ── Auth ─────────────────────────────────────────────

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.querySelector('.ai-footer').style.display = 'none';
  }

  function showSessionExpired() {
    clearSession();
    document.getElementById('sessionToast').classList.add('show');
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = '';
    document.querySelector('.ai-footer').style.display = '';
    loadAll();
  }

  async function boot() {
    const session = getSession();
    if (session && session.access_token) showApp();
    else showLogin();
  }

  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    const errBox   = document.getElementById('loginError');

    if (!email || !password) {
      errBox.textContent = 'Please enter your email and password.';
      errBox.style.display = '';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errBox.style.display = 'none';

    try {
      const session = await sbAuth(email, password);
      saveSession(session);
      showApp();
    } catch (e) {
      errBox.textContent = e.message;
      errBox.style.display = '';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  function signOut() {
    clearSession();
    showLogin();
  }

  // ── Settings ─────────────────────────────────────────

  function openSettings() {
    document.getElementById('cuToken').value  = localStorage.getItem('cu_token') || '';
    document.getElementById('cuListId').value = localStorage.getItem('cu_list_id') || '';
    document.getElementById('settingsModal').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settingsModal').classList.remove('open');
  }

  function saveSettings() {
    const t = document.getElementById('cuToken').value.trim();
    const l = document.getElementById('cuListId').value.trim();
    if (t) localStorage.setItem('cu_token', t); else localStorage.removeItem('cu_token');
    if (l) localStorage.setItem('cu_list_id', l); else localStorage.removeItem('cu_list_id');
    closeSettings();
    loadAll();
  }

  // ── Load ─────────────────────────────────────────────

  async function loadAll() {
    document.getElementById('loader').style.display = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
    setStatus('Loading…');

    const [nativeResult, clickupResult] = await Promise.allSettled([
      loadNativeTasks(),
      loadClickupTasks(),
      loadNoteCounts()
    ]);

    const tasks = [
      ...(nativeResult.status  === 'fulfilled' ? nativeResult.value  : []),
      ...(clickupResult.status === 'fulfilled' ? clickupResult.value : [])
    ];

    if (nativeResult.status === 'rejected')  showError('Supabase: '  + nativeResult.reason?.message);
    if (clickupResult.status === 'rejected') showError('ClickUp: '   + clickupResult.reason?.message);

    render(tasks);
    setStatus('Updated ' + new Date().toLocaleTimeString());
    document.getElementById('loader').style.display = 'none';
    document.getElementById('dashboard').style.display = '';
  }

  async function loadNativeTasks() {
    const rows = await sbSelect('tasks', 'completed=eq.false&order=due_date');
    return rows.map(t => ({
      id:           t.id,
      name:         t.name,
      due:          t.due_date ? new Date(t.due_date + 'T00:00:00') : null,
      priority:     t.priority || 'normal',
      status:       t.status || 'not-started',
      source:       'manual',
      url:          null,
      list:         '',
      document_url: t.document_url || null,
      subtasks:     []
    }));
  }

  async function loadClickupTasks() {
    const token  = localStorage.getItem('cu_token');
    const listId = localStorage.getItem('cu_list_id');
    if (!token) return [];

    const h = { Authorization: token };
    let raw = [];

    if (listId) {
      const r = await fetch(`${CU_BASE}/list/${listId}/task?include_closed=false&subtasks=true`, { headers: h });
      if (!r.ok) { const body = await r.json().catch(() => ({})); throw new Error('ClickUp ' + r.status + ': ' + (body.err || body.error || JSON.stringify(body))); }
      raw = (await r.json()).tasks || [];
    } else {
      const teamsR = await fetch(`${CU_BASE}/team`, { headers: h });
      if (!teamsR.ok) throw new Error('ClickUp API error ' + teamsR.status);
      const teams = (await teamsR.json()).teams || [];
      for (const team of teams) {
        const spaces = (await (await fetch(`${CU_BASE}/team/${team.id}/space?archived=false`, { headers: h })).json()).spaces || [];
        for (const space of spaces) {
          const lists = (await (await fetch(`${CU_BASE}/space/${space.id}/list?archived=false`, { headers: h })).json()).lists || [];
          for (const list of lists) {
            const tasks = (await (await fetch(`${CU_BASE}/list/${list.id}/task?include_closed=false&subtasks=true`, { headers: h })).json()).tasks || [];
            tasks.forEach(t => { t._listName = list.name; raw.push(t); });
          }
        }
      }
    }

    const childrenOf = {};
    raw.filter(t => t.parent).forEach(t => {
      const pid = typeof t.parent === 'object' ? t.parent.id : t.parent;
      if (!childrenOf[pid]) childrenOf[pid] = [];
      childrenOf[pid].push(t);
    });

    let overridesMap = {};
    try {
      const overrides = await sbSelect('clickup_overrides', '');
      overrides.forEach(o => { overridesMap[o.task_id] = o; });
    } catch(e) { /* overrides are optional */ }

    return raw.filter(t => !t.parent).map(t => {
      const pid  = t.priority ? (typeof t.priority === 'object' ? t.priority.id : t.priority) : 3;
      const pMap = { 1: 'urgent', 2: 'high', 3: 'normal', 4: 'low' };
      const subs = childrenOf[t.id] || [];
      const cuId = 'cu_' + t.id;
      const ov   = overridesMap[cuId] || {};
      return {
        id:       cuId,
        name:     t.name,
        due:          ov.due_date ? new Date(ov.due_date + 'T00:00:00')
                    : t.due_date  ? new Date(parseInt(t.due_date)) : null,
        priority:     ov.priority || pMap[pid] || 'normal',
        name:         ov.name || t.name,
        document_url: ov.document_url || null,
        source:       'clickup',
        url:      t.url || null,
        list:     t._listName || (t.list && t.list.name) || '',
        subtasks: subs.map(s => ({
          id:        's_cu_' + s.id,
          name:      s.name,
          completed: !!(s.status && (s.status.type === 'closed' || s.status.status === 'complete')),
          source:    'clickup'
        }))
      };
    });
  }

  // ── Subtasks ─────────────────────────────────────────

  function renderSubtaskDrawer(taskId, subtasks) {
    const todayMs = new Date().setHours(0,0,0,0);
    const rows = subtasks.map(s => {
      let dueTxt = '', dueCls = '';
      if (s.due_date) {
        const d = new Date(s.due_date + 'T00:00:00');
        const diff = Math.round((d - todayMs) / 86400000);
        if      (diff < 0)  { dueTxt = `${Math.abs(diff)}d ago`; dueCls = 'overdue'; }
        else if (diff === 0) { dueTxt = 'Today'; }
        else if (diff === 1) { dueTxt = 'Tomorrow'; }
        else                 { dueTxt = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); }
      }
      const prio = s.priority || 'normal';
      const docChip = s.document_url
        ? `<a class="doc-chip" href="${esc(s.document_url)}" target="_blank" rel="noopener" title="${esc(s.document_url)}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${(() => { try { return esc(new URL(s.document_url).hostname.replace('www.','')); } catch { return 'link'; } })()}</a>`
        : '';
      return `
      <div class="subtask-row" id="subrow-${s.id}">
        ${s.source === 'manual'
          ? `<input type="checkbox" class="sub-check" ${s.completed ? 'checked' : ''} onchange="toggleSubtaskComplete('${s.id}','${taskId}',this.checked)">`
          : `<input type="checkbox" class="sub-check" ${s.completed ? 'checked' : ''} disabled>`}
        <span class="sub-priority-dot p-${prio}" id="pdot-${s.id}" ${s.source==='manual'?`onclick="openPriorityMenu('${s.id}','subtasks','${prio}',this)"`:''} title="Priority"></span>
        <span class="sub-name${s.completed ? ' sub-done' : ''}" ${s.source==='manual'?`data-name="${esc(s.name)}" onclick="editSubName('${s.id}',this)"`:''} >${esc(s.name)}</span>
        ${docChip}
        ${dueTxt
          ? `<span class="sub-due ${dueCls}" ${s.source==='manual'?`data-due="${s.due_date||''}" onclick="editSubDue('${s.id}',this)"`:''} >${dueTxt}</span>`
          : (s.source==='manual' ? `<span class="sub-due add-due" data-due="" onclick="editSubDue('${s.id}',this)">+date</span>` : '')}
        ${s.source === 'manual' ? `<button class="sub-del" onclick="deleteSubtask('${s.id}','${taskId}')">×</button>` : ''}
      </div>`;
    }).join('');
    return rows + `
      <form class="sub-add-form" onsubmit="addSubtask(event,'${taskId}')">
        <input type="text" class="sub-input" placeholder="Add subtask…" required>
        <div class="sub-date-wrap"><input type="date" class="sub-date"></div>
        <select class="sub-priority">
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
          <option value="low">Low</option>
        </select>
        <input type="url" class="sub-doc-input" placeholder="Doc URL">
        <button type="submit" class="sub-add-btn">Add</button>
      </form>`;
  }

  async function toggleSubtasks(taskId) {
    const drawer  = document.getElementById('sub-' + taskId);
    const wrapper = document.getElementById('wrap-' + taskId);
    if (!drawer) return;
    const isOpen = drawer.classList.contains('open');
    if (!isOpen && !drawer.dataset.loaded) {
      drawer.innerHTML = '<span class="sub-loading">Loading…</span>';
      drawer.classList.add('open');
      if (wrapper) wrapper.classList.add('expanded');
      let cuSubs = [];
      if (drawer.dataset.cuSubs) {
        try { cuSubs = JSON.parse(decodeURIComponent(drawer.dataset.cuSubs)); } catch {}
      }
      try {
        const subs = await sbSelect('subtasks', `task_id=eq.${taskId}&order=created_at`);
        const mapped = subs.map(s => ({ id: s.id, name: s.name, completed: s.completed, source: 'manual', priority: s.priority || 'normal', due_date: s.due_date || null, document_url: s.document_url || null }));
        drawer.innerHTML = renderSubtaskDrawer(taskId, [...cuSubs, ...mapped]);
        drawer.dataset.loaded = '1';
      } catch (e) {
        drawer.innerHTML = `<span class="sub-error">Could not load subtasks: ${e.message}</span>` + renderSubtaskDrawer(taskId, cuSubs);
        drawer.dataset.loaded = '1';
      }
    } else {
      drawer.classList.toggle('open');
      if (wrapper) wrapper.classList.toggle('expanded');
    }
  }

  async function addSubtask(event, taskId) {
    event.preventDefault();
    const form       = event.target;
    const input      = form.querySelector('.sub-input');
    const name       = input.value.trim();
    if (!name) return;
    const due_date    = form.querySelector('.sub-date').value || null;
    const priority    = form.querySelector('.sub-priority').value;
    const document_url = form.querySelector('.sub-doc-input').value.trim() || null;
    input.disabled = true;
    try {
      await sbInsert('subtasks', { task_id: taskId, name, due_date, priority, document_url });
      const subs   = await sbSelect('subtasks', `task_id=eq.${taskId}&order=created_at`);
      const mapped = subs.map(s => ({ id: s.id, name: s.name, completed: s.completed, source: 'manual' }));
      const drawer = document.getElementById('sub-' + taskId);
      let cuSubs = [];
      if (drawer.dataset.cuSubs) {
        try { cuSubs = JSON.parse(decodeURIComponent(drawer.dataset.cuSubs)); } catch {}
      }
      drawer.innerHTML = renderSubtaskDrawer(taskId, [...cuSubs, ...mapped]);
    } catch (e) {
      showError(e.message);
      input.disabled = false;
    }
  }

  async function deleteSubtask(subtaskId, taskId) {
    try {
      await sbDelete('subtasks', subtaskId);
      const row = document.getElementById('subrow-' + subtaskId);
      if (row) row.remove();
    } catch (e) {
      showError(e.message);
    }
  }

  async function toggleSubtaskComplete(subtaskId, taskId, checked) {
    const row = document.getElementById('subrow-' + subtaskId);
    if (row) row.querySelector('.sub-name').classList.toggle('sub-done', checked);
    try {
      await sbPatch('subtasks', `id=eq.${subtaskId}`, { completed: checked });
    } catch (e) {
      if (row) row.querySelector('.sub-name').classList.toggle('sub-done', !checked);
      showError(e.message);
    }
  }

  // ── Add / Delete ─────────────────────────────────────

  function parseTaskDescription(desc) {
    let s = desc.trim();
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const fmt = d => d.toISOString().split('T')[0];

    // Priority
    let priority = 'normal';
    s = s.replace(/\b(urgent|high\s+priority|high|low\s+priority|low)\b/gi, m => {
      const l = m.toLowerCase();
      if (l.includes('urgent'))  priority = 'urgent';
      else if (l.includes('high')) priority = 'high';
      else if (l.includes('low'))  priority = 'low';
      return '';
    });

    // Due date
    let due_date = null;

    // today / tomorrow
    s = s.replace(/\btoday\b/gi,    () => { due_date = fmt(today); return ''; });
    s = s.replace(/\btomorrow\b/gi, () => {
      if (due_date) return '';
      const d = new Date(today); d.setDate(d.getDate() + 1); due_date = fmt(d); return '';
    });

    // "in N days/weeks"
    s = s.replace(/\bin (\d+)\s*(day|week)s?\b/gi, (_, n, unit) => {
      if (due_date) return '';
      const d = new Date(today);
      d.setDate(d.getDate() + parseInt(n) * (unit[0] === 'w' ? 7 : 1));
      due_date = fmt(d); return '';
    });

    // "next monday" or plain day name
    const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    s = s.replace(/\b(next\s+)?(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/gi, (m, next, day) => {
      if (due_date) return '';
      const target = DAYS.indexOf(day.toLowerCase());
      const d = new Date(today);
      let diff = (target - d.getDay() + 7) % 7;
      if (diff === 0 || next) diff += 7;
      d.setDate(d.getDate() + diff);
      due_date = fmt(d); return '';
    });

    // "may 7th", "jan 5", "december 25"
    const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    s = s.replace(/\b(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+(\d{1,2})(?:st|nd|rd|th)?\b/gi, (_, mon, day) => {
      if (due_date) return '';
      const m = MONTHS[mon.slice(0,3).toLowerCase()];
      const d = new Date(today.getFullYear(), m, parseInt(day));
      if (d < today) d.setFullYear(d.getFullYear() + 1);
      due_date = fmt(d); return '';
    });

    // strip filler words like "due", "by", "on"
    s = s.replace(/\b(due|by|on)\b/gi, '');

    const name = s.replace(/\s+/g, ' ').trim() || desc.trim();
    return { name, due_date, priority };
  }

  function toggleAddMode() {
    const ai     = document.getElementById('modeAI');
    const manual = document.getElementById('modeManual');
    const isAI   = ai.style.display !== 'none';
    ai.style.display     = isAI ? 'none' : 'flex';
    manual.style.display = isAI ? 'flex' : 'none';
  }

  async function addTaskAI() {
    const input   = document.getElementById('aiInput');
    const btn     = document.getElementById('aiBtn');
    const errBox  = document.getElementById('aiError');
    const description = input.value.trim();
    if (!description) return;

    btn.disabled = true;
    btn.textContent = '…';
    errBox.style.display = 'none';

    try {
      const { name, due_date, priority } = parseTaskDescription(description);
      await sbInsert('tasks', { name, due_date, priority, source: 'manual', completed: false });
      input.value = '';
      loadAll();
    } catch (e) {
      errBox.textContent = e.message;
      errBox.style.display = '';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add';
    }

  function editSubDue(subId, el) {
    const current = el.dataset.due || '';
    const input = document.createElement('input');
    input.type = 'date'; input.className = 'inline-date-input'; input.value = current;
    el.replaceWith(input); input.focus();
    const todayMs = new Date().setHours(0,0,0,0);
    const save = async () => {
      const due = input.value || null;
      if (due) {
        const d = new Date(due + 'T00:00:00');
        const diff = Math.round((d - todayMs) / 86400000);
        let txt = diff < 0 ? `${Math.abs(diff)}d ago` : diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        el.textContent = txt;
        el.className = `sub-due${diff < 0 ? ' overdue' : ''}`;
        el.dataset.due = due;
      } else {
        el.textContent = '+date'; el.className = 'sub-due add-due'; el.dataset.due = '';
      }
      input.replaceWith(el);
      try { await sbPatch('subtasks', `id=eq.${subId}`, { due_date: due }); }
      catch(e) { showError(e.message); }
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Escape') input.blur(); });

  // ── Render ───────────────────────────────────────────

  function render(tasks) {
    _tasksById = new Map(tasks.map(t => [t.id, t]));
    const now     = new Date();
    const today   = day(now);
    const weekEnd = new Date(today); weekEnd.setDate(today.getDate() + 7);

    const g = { overdue: [], today: [], week: [], upcoming: [], noDue: [] };

    tasks.forEach(t => {
      if (!t.due) { g.noDue.push(t); return; }
      const d = day(t.due);
      if      (d < today)          g.overdue.push(t);
      else if (+d === +today)      g.today.push(t);
      else if (d < weekEnd)        g.week.push(t);
      else                         g.upcoming.push(t);
    });

    const html = [
      section('Overdue',     g.overdue,  'overdue', true),
      section('Today',       g.today,    'today',   false),
      section('This Week',   g.week,     '',        false),
      section('Upcoming',    g.upcoming, '',        false),
      section('No Due Date', g.noDue,    '',        false),
    ].join('');

    document.getElementById('dashboard').innerHTML =
      html || '<p class="empty">No tasks yet. Add one above.</p>';
  }

  function section(title, tasks, cls, isOverdue) {
    if (!tasks.length) return '';
    return `<div class="section">
      <div class="section-header ${cls}">${title} <span class="badge-count">${tasks.length}</span></div>
      <div class="task-list">${tasks.map(t => taskRow(t, isOverdue)).join('')}</div>
    </div>`;
  }

  function taskRow(t, isOverdue) {
    const dueTxt  = t.due ? fmtDate(t.due) : '';
    const dueCls  = isOverdue ? 'overdue' : (dueTxt === 'Today' ? 'today' : '');
    const hasSubs = t.subtasks && t.subtasks.length > 0;
    const rawDue = t.due ? t.due.toISOString().split('T')[0] : '';
    const inner = `
      <span class="priority-dot p-${t.priority}" id="pdot-${t.id}" onclick="event.stopPropagation();openPriorityMenu('${t.id}','${t.source==='manual'?'tasks':'clickup_overrides'}','${t.priority}',this)" title="Priority"></span>
      <button class="task-action-btn" onclick="event.stopPropagation();openSubtaskAdd('${t.id}')" title="Add subtask">+</button>
      <button class="task-action-btn" onclick="event.stopPropagation();editDocUrl('${t.id}','${esc(t.document_url||'')}')" title="Set document"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
      <button class="task-notes-btn" id="nbtn-${t.id}" onclick="event.stopPropagation();openSidebar('${t.id}')" title="Notes &amp; docs"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
      ${t.source === 'manual' ? `<button class="status-badge s-${t.status}" id="status-${t.id}" data-status="${t.status}" onclick="event.stopPropagation();openStatusMenu('${t.id}','${t.status}',this)"><span class="status-dot"></span>${STATUS_CONFIG.find(s=>s.value===t.status)?.label||'Not Started'}</button>` : ''}
      ${hasSubs ? `<span class="sub-chevron">${t.subtasks.length}</span>` : ''}
      ${t.source === 'manual'
        ? `<span class="task-name" data-name="${esc(t.name)}" data-editable onclick="event.stopPropagation();editTaskName('${t.id}',this)">${esc(t.name)}</span>`
        : `<span class="task-name" data-name="${esc(t.name)}" data-editable onclick="event.stopPropagation();editCuTaskName('${t.id}',this)">${esc(t.name)}</span>`}
      ${t.document_url ? `<a class="doc-chip" href="${esc(t.document_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="${esc(t.document_url)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${(() => { try { return esc(new URL(t.document_url).hostname.replace('www.','')); } catch { return 'link'; } })()}</a>` : ''}
      <span class="source-badge source-${t.source}">${t.source === 'clickup' ? 'ClickUp' : 'Manual'}</span>
      ${t.list && t.url ? `<a class="source-badge source-manual task-list-link" href="${t.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(t.list)}</a>` : t.list ? `<span class="source-badge source-manual">${esc(t.list)}</span>` : ''}
      ${dueTxt
        ? `<span class="due-label ${dueCls}" data-due="${rawDue}" onclick="event.stopPropagation();${t.source==='manual'?`editTaskDue('${t.id}',this)`:`editCuTaskDue('${t.id}',this)`}">${dueTxt}</span>`
        : `<span class="add-due" data-due="" onclick="event.stopPropagation();${t.source==='manual'?`editTaskDue('${t.id}',this)`:`editCuTaskDue('${t.id}',this)`}">+date</span>`}
      ${t.source === 'manual' ? `<button class="task-del" onclick="event.stopPropagation();deleteTask('${t.id}')" title="Remove">×</button>` : ''}
    `;
    const row = `<div class="task${hasSubs ? ' has-subs' : ''}" onclick="toggleSubtasks('${t.id}')">${inner}</div>`;
    const cuSubsAttr = t.source === 'clickup' && hasSubs
      ? ` data-cu-subs="${esc(encodeURIComponent(JSON.stringify(t.subtasks)))}"`
      : '';
    return `<div class="task-wrapper" id="wrap-${t.id}">${row}<div class="subtask-drawer" id="sub-${t.id}"${cuSubsAttr}></div></div>`;
  }

  // ── Helpers ──────────────────────────────────────────

  function day(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

  function fmtDate(d) {
    const today    = day(new Date());
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const t        = day(d);
    if (t < today)        { const n = Math.round((today - t) / 86400000); return n === 1 ? '1 day ago' : `${n}d ago`; }
    if (+t === +today)    return 'Today';
    if (+t === +tomorrow) return 'Tomorrow';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = msg;
    b.style.display = '';
  }

  boot();
</script>

<div class="toast" id="sessionToast">
  Session expired
  <button class="toast-btn" onclick="signOut()">Sign in again</button>
</div>

<!-- ── Sidebar overlay ── -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ── Sidebar panel ── -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title" id="sidebarTitle"></span>
    <button class="sidebar-close" onclick="closeSidebar()">×</button>
  </div>
  <div class="sidebar-body">
    <div class="sidebar-section">
      <div class="sidebar-section-label">Docs</div>
      <div id="sidebarDocs"></div>
      <div class="sidebar-doc-add">
        <input type="url" class="sidebar-doc-input" id="sidebarDocInput" placeholder="Paste doc URL…"
          onkeydown="if(event.key==='Enter')sidebarAddDoc()">
        <button class="sidebar-add-btn" onclick="sidebarAddDoc()">Add</button>
      </div>
    </div>
    <div class="sidebar-notes">
      <div class="sidebar-notes-header">Notes</div>
      <div class="notes-feed" id="notesFeed"></div>
      <div class="note-add-row">
        <textarea class="note-textarea" id="noteInput" placeholder="Add a note…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sidebarPostNote()}"></textarea>
        <button class="note-post-btn" id="notePostBtn" onclick="sidebarPostNote()">Post</button>
      </div>
    </div>
  </div>
</div>

<div class="ai-footer" style="display:none">
  <div class="ai-bar">
    <button class="menu-toggle" onclick="toggleAddMode()" title="Switch input mode">&#9776;</button>

    <div id="modeAI" class="mode-panel">
      <input type="text" id="aiInput" class="ai-input" placeholder='Describe it — "call dentist friday urgent"' onkeydown="if(event.key==='Enter')addTaskAI()">
      <button class="ai-btn" onclick="addTaskAI()" id="aiBtn">Add</button>
    </div>

    <div id="modeManual" class="mode-panel" style="display:none">
      <input type="text" id="newName" class="ai-input" placeholder="Task name" onkeydown="if(event.key==='Enter')addTask()" style="flex:2">
      <input type="url" id="newDocUrl" class="ai-input" placeholder="Doc URL (optional)" style="flex:1.5">
      <input type="date" id="newDue" class="ai-input" style="flex:0 0 140px">
      <select id="newPriority" class="ai-input" style="flex:0 0 100px">
        <option value="normal">Normal</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
        <option value="low">Low</option>
      </select>
      <button class="ai-btn" onclick="addTask()" id="addBtn">Add</button>
    </div>
  </div>
  <div id="aiError" class="ai-error" style="display:none"></div>
</div>
</body>
</html>
